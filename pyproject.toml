[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "django-admin-alpine"
version = "0.0.1"
description = "Alpine.js variables in Django Admin forms"
authors = [
    { name = "Rodolfo Valentín Becerra García", email = "rodolvbg@gmail.com" }
]
requires-python = ">=3.8"
dependencies = [
    "Django>=3.2",
]

[tool.flake8]
max-line-length = 88
extend-ignore = "E203, W503"
